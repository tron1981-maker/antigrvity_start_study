<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>내 첫번째 아이디어</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;700&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #061a0e, #0a2e18, #0d3b22);
      font-family: 'Noto Sans KR', sans-serif;
      overflow: hidden;
    }

    /* 배경 빛나는 원 */
    body::before,
    body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.25;
      animation: pulse 6s ease-in-out infinite alternate;
    }

    body::before {
      width: 500px;
      height: 500px;
      background: #00c853;
      top: -150px;
      left: -150px;
    }

    body::after {
      width: 400px;
      height: 400px;
      background: #76ff03;
      bottom: -100px;
      right: -100px;
      animation-delay: 3s;
    }

    @keyframes pulse {
      from { transform: scale(1); opacity: 0.2; }
      to   { transform: scale(1.3); opacity: 0.35; }
    }

    .card {
      position: relative;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(72, 255, 130, 0.25);
      border-radius: 24px;
      padding: 64px 80px;
      text-align: center;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5), 0 0 40px rgba(0, 200, 83, 0.15);
      animation: fadeInUp 0.9s ease both;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(40px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .icon {
      font-size: 3rem;
      margin-bottom: 24px;
      display: block;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-8px); }
    }

    h1 {
      font-size: clamp(3rem, 7vw, 5rem);
      font-weight: 700;
      background: linear-gradient(90deg, #69f0ae, #00e676, #b9f6ca);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.02em;
      line-height: 1.2;
      text-shadow: none;
      filter: drop-shadow(0 0 18px rgba(0, 230, 118, 0.5));
    }

    .sub {
      margin-top: 16px;
      font-size: 0.95rem;
      font-weight: 300;
      color: rgba(255, 255, 255, 0.45);
      letter-spacing: 0.08em;
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="icon">💡</span>
    <h1>내 첫 번째 아이디어</h1>
    <p class="sub">My First Idea</p>
  </div>
</body>
</html>
