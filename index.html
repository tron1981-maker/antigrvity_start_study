<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>내 첫번째 아이디어</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;700&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #061a0e, #0a2e18, #0d3b22);
      font-family: 'Noto Sans KR', sans-serif;
      overflow: hidden;
      position: relative;
    }

    /* 헤더 상단 바 스타일 */
    .header {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 24px 60px;
      z-index: 10;
      background: rgba(255, 255, 255, 0.02);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .logo {
      font-size: 1.25rem;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: 0.05em;
    }

    .nav-links {
      display: flex;
      gap: 40px; /* 각 메뉴 사이의 적당한 간격 */
      list-style: none;
    }

    .nav-links a {
      color: rgba(255, 255, 255, 0.7);
      text-decoration: none;
      font-size: 1rem;
      font-weight: 300;
      letter-spacing: 0.05em;
      transition: all 0.3s ease;
      position: relative;
    }

    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: -6px;
      left: 0;
      width: 0;
      height: 2px;
      background: #00c853;
      transition: width 0.3s ease;
    }

    .nav-links a:hover {
      color: #ffffff;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.4);
    }

    .nav-links a:hover::after {
      width: 100%;
    }

    @media (max-width: 768px) {
      .header {
        padding: 20px 30px;
      }
      .nav-links {
        gap: 24px;
      }
    }

    /* 배경 빛나는 원 */
    body::before,
    body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.25;
      animation: pulse 6s ease-in-out infinite alternate;
    }

    body::before {
      width: 500px;
      height: 500px;
      background: #00c853;
      top: -150px;
      left: -150px;
    }

    body::after {
      width: 400px;
      height: 400px;
      background: #76ff03;
      bottom: -100px;
      right: -100px;
      animation-delay: 3s;
    }

    @keyframes pulse {
      from { transform: scale(1); opacity: 0.2; }
      to   { transform: scale(1.3); opacity: 0.35; }
    }

    .card {
      position: relative;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(72, 255, 130, 0.25);
      border-radius: 24px;
      padding: 64px 80px;
      text-align: center;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5), 0 0 40px rgba(0, 200, 83, 0.15);
      animation: fadeInUp 0.9s ease both;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(40px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .icon {
      font-size: 3rem;
      margin-bottom: 24px;
      display: block;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-8px); }
    }

    h1 {
      font-size: 40px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: -0.02em;
      line-height: 1.2;
      text-shadow: 0 0 15px rgba(255, 255, 255, 0.4);
    }

    .sub {
      margin-top: 16px;
      font-size: 0.95rem;
      font-weight: 300;
      color: rgba(255, 255, 255, 0.45);
      letter-spacing: 0.08em;
    }

    .next-btn {
      margin-top: 32px;
      padding: 14px 28px;
      font-size: 1rem;
      font-weight: 700;
      color: #061a0e;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      font-family: 'Noto Sans KR', sans-serif;
      transition: all 0.3s ease;
    }

    /* 노란색 버튼 */
    .next-btn.yellow {
      background: linear-gradient(135deg, #ffd600, #ffeb3b);
      box-shadow: 0 10px 20px rgba(255, 235, 59, 0.2), 0 0 15px rgba(255, 235, 59, 0.3);
    }
    .next-btn.yellow:hover {
      transform: translateY(-2px);
      background: linear-gradient(135deg, #ffea00, #ffee58);
      box-shadow: 0 15px 25px rgba(255, 235, 59, 0.3), 0 0 25px rgba(255, 235, 59, 0.5);
    }

    /* 주황색 버튼 */
    .next-btn.orange {
      background: linear-gradient(135deg, #ff9100, #ffb74d);
      box-shadow: 0 10px 20px rgba(255, 145, 0, 0.2), 0 0 15px rgba(255, 145, 0, 0.3);
    }
    .next-btn.orange:hover {
      transform: translateY(-2px);
      background: linear-gradient(135deg, #ffab40, #ffd180);
      box-shadow: 0 15px 25px rgba(255, 145, 0, 0.3), 0 0 25px rgba(255, 145, 0, 0.5);
    }

    /* 초록색 버튼 */
    .next-btn.green {
      background: linear-gradient(135deg, #00c853, #69f0ae);
      box-shadow: 0 10px 20px rgba(0, 200, 83, 0.2), 0 0 15px rgba(0, 200, 83, 0.3);
    }
    .next-btn.green:hover {
      transform: translateY(-2px);
      background: linear-gradient(135deg, #00e676, #b9f6ca);
      box-shadow: 0 15px 25px rgba(0, 200, 83, 0.3), 0 0 25px rgba(0, 200, 83, 0.5);
    }

    .next-btn:active {
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="logo">💡 Idea</div>
    <ul class="nav-links">
      <li><a href="#intro">소개</a></li>
      <li><a href="#features">기능</a></li>
      <li><a href="#contact">문의</a></li>
    </ul>
  </header>

  <div class="card">
    <span class="icon">💡</span>
    <h1>오늘도 힘내세요!</h1>
    <p class="sub">Cheer up today!</p>
    <button class="next-btn yellow">다음 문장보기</button>
  </div>

  <script>
    const sentences = [
      { ko: "오늘도 힘내세요!", en: "Cheer up today!" },
      { ko: "오늘도 해냈어요!", en: "You did it today!" },
      { ko: "조금씩 나아지고 있어요.", en: "Getting better day by day!" },
      { ko: "이대로 계속 가봅시다.", en: "Let's keep going like this!" }
    ];

    let currentIndex = 0;
    const h1 = document.querySelector('h1');
    const sub = document.querySelector('.sub');
    const btn = document.querySelector('.next-btn');

    function updateButtonColor(sentenceKo) {
      btn.classList.remove('yellow', 'orange', 'green');
      if (sentenceKo.includes('오늘도 해냈어요') || sentenceKo.includes('오늘도 힘내세요')) {
        btn.classList.add('yellow');
      } else if (sentenceKo.includes('조금씩 나아지고 있어요')) {
        btn.classList.add('orange');
      } else if (sentenceKo.includes('이대로 계속 가봅시다')) {
        btn.classList.add('green');
      }
    }

    btn.addEventListener('click', () => {
      currentIndex = (currentIndex + 1) % sentences.length;
      const current = sentences[currentIndex];
      h1.textContent = current.ko;
      sub.textContent = current.en;
      updateButtonColor(current.ko);
    });
  </script>
</body>
</html>
